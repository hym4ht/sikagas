services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sikagas_app
    restart: unless-stopped
    ports:
      - "8037:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    env_file:
      - .env
    volumes:
      - ./storage:/var/www/html/storage
      - ./public/storage:/var/www/html/public/storage
    depends_on:
      db:
        condition: service_healthy
    command: php artisan serve --host=0.0.0.0 --port=8000

  db:
    image: mysql:8.0
    container_name: sikagas_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sikagas
      MYSQL_USER: jeki
      MYSQL_PASSWORD: sikagas123
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "jeki", "-psikagas123"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dbdata:
